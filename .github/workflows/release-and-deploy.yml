name: Release and Deploy

on:
  push:
    branches:
      - staging # Update to 'main' if that is your default branch

# CRITICAL: release-please requires these permissions to create tags,
# update the CHANGELOG.md, and manage the Release PR.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # We expose the outputs so the next job knows if it should run
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          # 'node' handles standard package.json version bumping
          release-type: node
          target-branch: master

  build-and-deploy:
    needs: release-please
    # ONLY run this job if the Release PR was merged and a tag was cut
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Ensure we check out the exact tag that was just created, not just the master HEAD
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm' # Change to 'yarn' or 'pnpm' if applicable

      - name: Install dependencies
        run: npm ci

      - name: Build React App
        run: npm run build

      # Assuming you are deploying a static React app to Cloudflare Pages via Wrangler.
      # If you are using raw Workers, change the command to 'deploy'.
      # - name: Deploy to Cloudflare
      #   uses: cloudflare/wrangler-action@v3
      #   with:
      #     apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      #     accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      #     command: pages deploy build/ --project-name=your-cloudflare-project-name
